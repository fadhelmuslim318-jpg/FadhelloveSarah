<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something For You My Lovely Sarah 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --maroon: #1a0510;
    --deep: #0d0208;
    --rose: #c4547a;
    --blush: #e8a0b4;
    --gold: #d4a843;
    --cream: #f5e8e4;
    --card-bg: rgba(40, 8, 20, 0.85);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--maroon);
    color: var(--cream);
    font-family: 'EB Garamond', serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── CANVAS ── */
  #petals-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── OPENING SCREEN ── */
  #opening {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: radial-gradient(ellipse at center, #2d0a18 0%, #0d0208 70%);
    transition: opacity 0.8s ease, visibility 0.8s;
  }
  #opening.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .gift-wrap {
    position: relative;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    user-select: none;
  }

  .gift-box {
    font-size: 110px;
    line-height: 1;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 40px rgba(196, 84, 122, 0.4));
    transition: transform 0.2s;
  }
  .gift-box:hover { transform: scale(1.05); }
  .gift-box.shake {
    animation: shake 0.5s ease, float 3s ease-in-out infinite 0.5s;
  }
  .gift-box.explode {
    animation: explode 0.6s ease forwards;
  }

  .tap-hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.25em;
    color: var(--blush);
    opacity: 0.7;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
  }

  .sparkle-row {
    display: flex; gap: 8px;
    font-size: 12px;
    opacity: 0.5;
    color: var(--gold);
    animation: pulse 2.5s ease-in-out infinite 0.5s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    20% { transform: rotate(-8deg) scale(1.05); }
    40% { transform: rotate(8deg) scale(1.08); }
    60% { transform: rotate(-5deg) scale(1.05); }
    80% { transform: rotate(5deg); }
  }
  @keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* ── MAIN CONTENT ── */
  #content {
    position: relative;
    z-index: 10;
    opacity: 0;
    transition: opacity 1s ease 0.3s;
  }
  #content.visible { opacity: 1; }

  /* ── MUSIC PLAYER ── */
  #player {
    position: fixed;
    left: 20px;
    bottom: 30px;
    z-index: 200;
    background: rgba(10, 3, 8, 0.9);
    border: 1px solid rgba(196, 84, 122, 0.3);
    border-radius: 16px;
    padding: 14px 16px;
    width: 200px;
    backdrop-filter: blur(12px);
    display: none;
  }
  #player.show { display: block; }
  .player-cover {
    width: 48px; height: 48px;
    border-radius: 8px;
    background: linear-gradient(135deg, #3d0f20, #1a0510);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    float: left;
    margin-right: 10px;
  }
  .player-info { overflow: hidden; }
  .player-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-artist {
    font-size: 11px;
    color: var(--blush);
    opacity: 0.7;
    margin-top: 2px;
  }
  .player-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 10px;
    clear: both;
    padding-top: 8px;
    border-top: 1px solid rgba(196, 84, 122, 0.15);
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--blush);
    font-size: 16px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .ctrl-btn:hover { opacity: 1; }
  .ctrl-btn.play {
    width: 32px; height: 32px;
    background: var(--rose);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: white;
    opacity: 1;
  }
  .progress-bar {
    height: 2px;
    background: rgba(196, 84, 122, 0.2);
    border-radius: 2px;
    margin-top: 10px;
    position: relative;
  }
